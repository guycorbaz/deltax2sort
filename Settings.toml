# Delta X2 LEGO Sorting System configuration.
# Values are validated at startup; anything that would command the robot
# outside its physical workspace is rejected before hardware is touched.

[robot]
port_name = "/dev/ttyUSB0"
baud_rate = 115200
home_on_connect = true
# Workspace bounds (mm). Delta X2 spec: X/Y in [-160, 160], Z in [-200, 0].
x_min = -150.0
x_max = 150.0
y_min = -150.0
y_max = 150.0
z_min = -200.0
z_max = 0.0
# Pick height (belt surface) and safe travel height, both within [z_min, z_max].
z_pick = -180.0
z_travel = -150.0
# G-code feed rate in mm/min (F parameter of G01).
feed_rate = 15000
# Open the gripper (M05) on emergency stop, just before M112. Default false so
# a held part is not dropped at an arbitrary position; set true only for cells
# where releasing on E-stop is the safe, desired behaviour.
release_gripper_on_estop = false

[conveyor]
port_name = "/dev/ttyUSB1"
baud_rate = 115200
# Raw S-value sent with the M3 start command.
default_speed = 1000
# Belt speed in robot coordinates, mm/s. Signed: positive = objects move toward +Y.
speed_mm_s = 100.0

[camera]
# The camera model is not chosen yet: all capture parameters are configurable.
# The driver logs (and adopts) the mode actually granted by the device.
device_id = 0
width = 1280
height = 720
fps = 30
# Pixel-format FOURCC, e.g. "MJPG" — many UVC cameras need it to reach full
# frame rate at higher resolutions. Omit to keep the driver default.
# fourcc = "MJPG"

[sorting]
# Sorting has two independent layers: physical drop bins, and an assignment of
# learned object classes to those bins. Object recognition (the learned
# catalogue) is kept separate, so the same catalogue can drive different bin
# layouts. A class with no assignment — and any unrecognised object — is NOT
# picked: it rides the belt to the end catch bin. That "do nothing" default is
# what makes an uncertain object safe.
#
# Drop bins around the belt (as many as you have, each at a fixed measured
# position inside the robot workspace). Uncomment and set to your rig:
# [[sorting.bins]]
# id = "bin-1"
# x = 120.0
# y = 60.0
# z = -100.0
#
# [[sorting.bins]]
# id = "bin-2"
# x = -120.0
# y = 60.0
# z = -100.0
#
# Which learned class goes to which bin (by class name → bin id). Built as you
# teach the system; a class not listed here is left on the belt:
# [[sorting.assignments]]
# class = "brick-2x4-red"
# bin = "bin-1"

[vision]
# Fixed binary threshold (0-255) applied after grayscale + blur.
threshold = 60.0
# Contour area limits (pixels²) for a blob to count as an object.
min_area = 500.0
max_area = 10000.0
# true: objects darker than the belt; false: lighter.
invert = true
# Camera scale at the belt plane, mm per pixel. Sets the pixel→robot
# transform; measure it (e.g. a ruler on the belt) and update after any
# camera height or resolution change.
mm_per_px = 0.5

[logging]
# Debug logging to a daily-rotating file (plus the console when to_console).
# level uses the RUST_LOG grammar: a bare level ("error"/"warn"/"info"/
# "debug"/"trace") or a per-module filter ("info,deltax2sort=debug" to trace
# G-code without flooding). A RUST_LOG env var, if set, overrides this.
level = "info"
# Directory for the log files (created if missing; git-ignored).
directory = "logs"
# Also mirror records to stderr (handy in dev/mock; a kiosk Pi can disable it).
to_console = true
# How many rotated daily files to keep; older are pruned. 0 = keep them all.
keep_days = 7
